<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Panel Modelo</title>
</head>

<body>

<nav class="navbar navbar-expand-sm bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">BellasCBA</a>
    <button class="btn btn-dark btn-sm ms-auto" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- PERFIL -->
  <div class="card p-3 mb-4">
    <h3 id="nombreModelo">Melani</h3>

    <p><strong>Edad:</strong> <span id="edadView"></span></p>
    <p><strong>Altura:</strong> <span id="alturaView"></span></p>
    <p><strong>Medidas:</strong> <span id="medidasView"></span></p>
    <p><strong>Cabello:</strong> <span id="cabelloView"></span></p>
    <p><strong>Ojos:</strong> <span id="ojosView"></span></p>
  </div>

  <!-- EDITAR PERFIL -->
  <div class="card p-3 mb-4">
    <h4>Editar perfil</h4>

    <input id="edad" class="form-control mb-2" placeholder="Edad">
    <input id="altura" class="form-control mb-2" placeholder="Altura">
    <input id="medidas" class="form-control mb-2" placeholder="Medidas">
    <input id="cabello" class="form-control mb-2" placeholder="Cabello">
    <input id="ojos" class="form-control mb-2" placeholder="Ojos">

    <button class="btn btn-primary" onclick="guardarPerfil()">
      Guardar cambios
    </button>
  </div>

  <!-- PUBLICAR -->
  <div class="card p-3 mb-4">
    <h4>Publicar mensaje</h4>

    <textarea id="postText" class="form-control"></textarea>

    <button class="btn btn-success mt-2" onclick="crearPost()">
      Publicar
    </button>
  </div>

  <!-- POSTS -->
  <div class="card p-3">
    <h4>Mis publicaciones</h4>
    <div id="postsContainer"></div>
  </div>

</div>

<script>
/* PERFIL BASE (solo la primera vez) */
if (!localStorage.getItem("melani")) {
  localStorage.setItem("melani", JSON.stringify({
    nombre: "Melani",
    edad: "24",
    altura: "1.70m",
    medidas: "90 - 60 - 90",
    cabello: "Castaño",
    ojos: "Verdes"
  }));
}

/* CARGAR PERFIL */
function cargarPerfil() {
  const perfil = JSON.parse(localStorage.getItem("melani"));

  document.getElementById("edad").value = perfil.edad;
  document.getElementById("altura").value = perfil.altura;
  document.getElementById("medidas").value = perfil.medidas;
  document.getElementById("cabello").value = perfil.cabello;
  document.getElementById("ojos").value = perfil.ojos;

  document.getElementById("edadView").innerText = perfil.edad;
  document.getElementById("alturaView").innerText = perfil.altura;
  document.getElementById("medidasView").innerText = perfil.medidas;
  document.getElementById("cabelloView").innerText = perfil.cabello;
  document.getElementById("ojosView").innerText = perfil.ojos;
}

/* GUARDAR PERFIL */
function guardarPerfil() {
  const perfil = JSON.parse(localStorage.getItem("melani"));

  perfil.edad = document.getElementById("edad").value;
  perfil.altura = document.getElementById("altura").value;
  perfil.medidas = document.getElementById("medidas").value;
  perfil.cabello = document.getElementById("cabello").value;
  perfil.ojos = document.getElementById("ojos").value;

  localStorage.setItem("melani", JSON.stringify(perfil));

  cargarPerfil();
  alert("Perfil actualizado");
}

/* POSTS */
function crearPost() {

  const texto = document.getElementById("postText").value;

  const posts = JSON.parse(localStorage.getItem("posts")) || [];

  posts.push({
    id: Date.now(),
    nombre: "Melani",
    texto: texto
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  cargarPosts();
}

function cargarPosts() {

  const posts = JSON.parse(localStorage.getItem("posts")) || [];

  const cont = document.getElementById("postsContainer");

  cont.innerHTML = posts.map(p => `
    <div class="border p-2 mb-2 rounded">
      <b>${p.nombre}</b>
      <p>${p.texto}</p>
    </div>
  `).join("");
}

window.onload = function () {
  cargarPerfil();
  cargarPosts();
};

</script>

</body>
</html>
